version: '3.8'

services:
  api:
    build:
      context: ./smch-api
      dockerfile: Dockerfile
    container_name: smch-api
    working_dir: /var/www/html
    volumes:
      - ./smch-api:/var/www/html
    env_file:
      - ./smch-api/.env.docker
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: >
      sh -c "composer install --no-interaction --prefer-dist || true && php artisan key:generate --force || true && php artisan migrate --force || true && php artisan serve --host=0.0.0.0 --port=8000"

  web:
    build:
      context: ./smch-web
      dockerfile: Dockerfile
    container_name: smch-web
    working_dir: /app
    volumes:
      - ./smch-web:/app
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install --no-audit --silent || true && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - api

  db:
    image: mysql:8.0
    container_name: smch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: smch
      MYSQL_USER: smch
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: smch-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  db_data:
    name: smch_db_data
